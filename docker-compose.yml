services:
  # ═════════════════════════���════════════════════════
  # INFRAESTRUTURA
  # ══════════════════════════════════════════════════

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: odontoflow
      POSTGRES_USER: odontoflow
      POSTGRES_PASSWORD: odontoflow
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odontoflow"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  # ═══��══════════════════════════════════════════════
  # APLICACAO (dev com hot-reload)
  # ═════���════════════════════════════════════════════

  backend:
    build:
      context: ./backend
      target: development
    ports:
      - "8000:8000"
    volumes:
      - ./backend/src:/app/src
      - ./backend/tests:/app/tests
      - ./backend/alembic:/app/alembic
      - ./backend/scripts:/app/scripts
      - ./backend/alembic.ini:/app/alembic.ini
    environment:
      DATABASE_URL: postgresql+asyncpg://odontoflow:odontoflow@postgres:5432/odontoflow
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: docker-dev-secret-key-change-in-production
      JWT_ALGORITHM: HS256
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: "60"
      JWT_REFRESH_TOKEN_EXPIRE_DAYS: "30"
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: odontoflow
      ALLOWED_ORIGINS: http://localhost:3000
      APP_ENV: development
      LOG_LEVEL: DEBUG
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      target: development
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/postcss.config.mjs:/app/postcss.config.mjs
      - ./frontend/next.config.js:/app/next.config.js
      - ./frontend/tsconfig.json:/app/tsconfig.json
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend

  # ════════════════════════════════════���═════════════
  # UTILITARIOS (rodam sob demanda com --profile)
  # ═══════════��═══════════════════════════���══════════

  test:
    build:
      context: ./backend
      target: development
    volumes:
      - ./backend/src:/app/src
      - ./backend/tests:/app/tests
    environment:
      JWT_SECRET_KEY: test-secret-key
    profiles:
      - test
    command: ["pytest", "tests/", "-x", "-v", "--tb=short"]

  lint:
    build:
      context: ./backend
      target: development
    volumes:
      - ./backend/src:/app/src
      - ./backend/tests:/app/tests
    profiles:
      - tools
    command: ["ruff", "check", "src/", "tests/"]

volumes:
  pgdata:
  minio-data:
